<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analysis History Flow Fixture</title>
</head>
<body>
  <section class="tab-panel is-active" data-panel="history">
    <article class="chart-card history-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Heat</th>
              <th>Date</th>
              <th>Readiness</th>
              <th>Load</th>
              <th>Ratio</th>
              <th>Recommendation</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>
    </article>
  </section>

  <section class="tab-panel is-active" data-panel="activities">
    <article class="chart-card">
      <div class="chart-head">
        <div>
          <p class="eyebrow">Activities</p>
          <h3 id="activityHeadline">Focus Day Activities</h3>
        </div>
      </div>
      <p id="activitySelectionMeta">History selection drives this view.</p>
      <div id="activityDaySummary"></div>
      <div id="activityList"></div>
    </article>
  </section>

  <script type="module">
    import { renderAnalysisHistorySurface } from "/static/dashboard/components/analysis/AnalysisHistorySurface.js";

    const historyRows = [
      {
        date: "2026-03-10",
        readiness: 60,
        loadDay: 22,
        ratio7to28: 0.88,
        primaryRecommendation: "Easy Aerobic",
      },
      {
        date: "2026-03-11",
        readiness: 71,
        loadDay: 48,
        ratio7to28: 0.99,
        primaryRecommendation: "Moderate only",
      },
      {
        date: "2026-03-12",
        readiness: 78,
        loadDay: 84,
        ratio7to28: 1.08,
        primaryRecommendation: "Threshold OK",
      },
    ];

    const detailByDay = {
      "2026-03-10": {
        sessionType: "easy",
        activities: [],
      },
      "2026-03-11": {
        sessionType: "moderate",
        activities: [
          {
            name: "Steady Ride",
            type_key: "cycling",
            start_local: "2026-03-11 18:00",
            duration_min: 58,
            avg_hr: 139,
            training_load: 54,
            sport_tag: "bike",
            sessionType: "moderate",
          },
        ],
      },
      "2026-03-12": {
        sessionType: "threshold",
        activities: [
          {
            name: "Track Intervals",
            type_key: "running",
            start_local: "2026-03-12 07:05",
            duration_min: 61,
            avg_hr: 151,
            max_hr: 176,
            aerobic_te: 3.7,
            anaerobic_te: 1.0,
            training_load: 82,
            sport_tag: "run",
            sessionType: "threshold",
          },
        ],
      },
    };

    const decisionByDay = {
      "2026-03-10": { primaryRecommendation: "Easy Aerobic" },
      "2026-03-11": { primaryRecommendation: "Moderate only" },
      "2026-03-12": { primaryRecommendation: "Threshold OK" },
    };

    let activeDate = "2026-03-12";

    function payloadFor(date) {
      return {
        date,
        history: { rows: historyRows },
        detail: {
          activeDate: date,
          sessionType: detailByDay[date]?.sessionType || null,
          activities: detailByDay[date]?.activities || [],
        },
        decision: decisionByDay[date] || {},
      };
    }

    function render() {
      renderAnalysisHistorySurface(payloadFor(activeDate), {
        onSelectDay(nextDate) {
          activeDate = nextDate;
          render();
        },
      });
    }

    render();
  </script>
</body>
</html>
