<section class="surface-intro surface-intro-debug">
  <div>
    <p class="eyebrow">Debug</p>
    <h2>Trace And Prompt Export</h2>
    <p class="muted-copy">
      Decision trace and prompt export stay outside the main flow and appear only in debug mode.
    </p>
  </div>
</section>

<section class="debug-grid">
  <article class="panel">
    <div class="panel-head-space">
      <div>
        <p class="eyebrow">Decision Trace</p>
        <h2>Rule Path And Scores</h2>
      </div>
    </div>
    <div id="debugList" class="debug-list"></div>
    <div class="debug-section">
      <p class="eyebrow">Forecast Trace</p>
      <div id="forecastDebugList" class="debug-list"></div>
    </div>
  </article>

  <article class="panel">
    <div class="panel-head-space">
      <div>
        <p class="eyebrow">AI Prompt</p>
        <h2>Prompt Export</h2>
      </div>
      <button id="copyPromptBtn" class="btn btn-secondary" type="button">Copy Prompt</button>
    </div>
    <textarea id="aiPrompt" spellcheck="false" readonly></textarea>
  </article>
</section>
