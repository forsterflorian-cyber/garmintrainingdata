<section class="surface-intro">
  <div>
    <p class="eyebrow">Sync</p>
    <h2>Sync status and manual refresh</h2>
    <p class="muted-copy">
      First sync backfills history. Later updates are incremental and can fill recent gaps. Garmin credential changes live in settings.
    </p>
  </div>
  <div class="button-row">
    <button id="syncSettingsBtn" class="btn btn-secondary" type="button">Open Settings</button>
  </div>
</section>

<section class="dashboard-grid sync-grid">
  <article class="panel span-12">
    <div class="panel-head-space">
      <div>
        <p class="eyebrow">Garmin Sync</p>
        <h2>Current sync state</h2>
      </div>
      <p data-garmin-status class="muted-copy">Garmin sync status will appear here.</p>
    </div>
    <div id="syncStatusPanel" class="sync-status-panel"></div>
    <div id="syncActionButtons" class="button-row sync-action-row"></div>
  </article>
</section>
