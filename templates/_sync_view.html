<section class="surface-intro">
  <div>
    <p class="eyebrow">Sync</p>
    <h2>Account, Garmin credentials and sync operations</h2>
    <p class="muted-copy">
      Login, connect Garmin, run updates or backfills, and inspect sync status without crowding the planning flow.
    </p>
  </div>
</section>

<section class="auth-grid sync-grid">
  <article class="panel auth-panel">
    <div class="panel-head-space">
      <div>
        <p class="eyebrow">App Konto</p>
        <h2>Supabase Login</h2>
      </div>
      <p id="authStatus" class="muted-copy">Nicht eingeloggt</p>
    </div>
    <label class="field">
      <span>E-Mail</span>
      <input id="loginEmail" type="email" placeholder="name@example.com">
    </label>
    <label class="field">
      <span>Passwort</span>
      <input id="loginPassword" type="password" placeholder="Dein Dashboard Passwort">
    </label>
    <div class="button-row">
      <button id="loginBtn" class="btn btn-primary" type="button">Login</button>
      <button id="signupBtn" class="btn btn-secondary" type="button">Registrieren</button>
      <button id="logoutBtn" class="btn btn-secondary" type="button" hidden>Logout</button>
    </div>
  </article>

  <article class="panel auth-panel">
    <div class="panel-head-space">
      <div>
        <p class="eyebrow">Garmin Connect</p>
        <h2>Synchronisation</h2>
      </div>
    </div>
    <p id="garminStatus" class="muted-copy">Bitte zuerst einloggen, um Garmin zu verbinden.</p>
    <label class="field">
      <span>Garmin E-Mail</span>
      <input id="garminEmail" type="email" placeholder="dein-garmin-login@example.com" disabled>
    </label>
    <label class="field">
      <span>Garmin Passwort</span>
      <input id="garminPassword" type="password" placeholder="Dein Garmin Passwort" disabled>
    </label>
    <div class="button-row">
      <button id="connectGarminBtn" class="btn btn-primary" type="button" disabled>Garmin speichern</button>
    </div>
    <div id="syncStatusPanel" class="sync-status-panel"></div>
    <div id="syncActionButtons" class="button-row sync-action-row"></div>
  </article>
</section>
